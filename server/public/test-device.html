<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Laptop Mic Test Device</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="dashboard">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Test Device</p>
            <h1>Laptop Mic Stream</h1>
            <p id="testMessage" class="message">Paste the device token, start the mic, then use the main dashboard to listen.</p>
          </div>
          <div class="status-card">
            <span id="testStatusPill" class="pill offline"><span class="status-dot"></span>STOPPED</span>
            <span class="status-label">Laptop mic status</span>
          </div>
        </header>

        <section class="control-grid">
          <div class="control-panel">
            <label class="token">
              <span>Device token</span>
              <span class="token-input">
                <input id="deviceTokenInput" type="password" autocomplete="off" placeholder="Paste DEVICE_TOKEN from Render">
                <button id="toggleDeviceTokenBtn" class="icon-button is-hidden" type="button" aria-label="Show device token" aria-pressed="false">
                  <span class="eye-icon" aria-hidden="true"></span>
                </button>
              </span>
            </label>

            <div class="actions test-actions">
              <button id="startTestBtn" class="success-action" type="button">START LAPTOP MIC</button>
              <button id="stopTestBtn" class="danger-action" type="button" disabled>STOP</button>
            </div>
          </div>

          <aside class="audio-panel">
            <div class="audio-head">
              <span>Input level</span>
              <strong id="testLevelText">Idle</strong>
            </div>
            <div class="meter" aria-hidden="true">
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
              <span class="test-bar bar"></span>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <script src="/mic-test.js"></script>
  </body>
</html>
